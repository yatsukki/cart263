<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controller Screen Animation</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-image: url(media/bg.png);
        background-repeat: repeat;
        background-color: #413C9D;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .console {
        position: relative;
        /* width: 900px; */
        max-width: 90vw;
        will-change: transform;
        transition: transform 0.08s linear;
      }

      .console img {
        width: 100%;
        display: block;
      }

      /* .screen {
        position: absolute;
        left: 0%;
        top: 10%;
        width: 38%;
        height: 46%;
        overflow: hidden;
      } */

      .screen video {
        width: 97%;
        height: 97%;
        object-fit: cover;
        display: block;
        z-index: -1;
      }
    </style>
    
  </head>


  <body>
    <div class="console" id="console">
      <img src="media/gameboy.gif" alt="gameboy" style="width: 300px;">

      <!-- <div class="screen">
        <video
          id="screenVideo"
          src="media/gamekerven.mp4"
          autoplay
          muted
          loop
          playsinline
        ></video>
      </div> -->
    </div>

    <script>
      const consoleEl = document.getElementById("console");
      const videoEl = document.getElementById("screenVideo");

      let floatOffset = 0;

      function animate() {
        floatOffset += 0.03;

        const floatY = Math.sin(floatOffset) * 15;

        const mouseX = window.mouseX || window.innerWidth / 2;
        const mouseY = window.mouseY || window.innerHeight / 2;

        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;

        const offsetX = mouseX - centerX;
        const offsetY = mouseY - centerY;

        const moveX = offsetX * 0.03;
        const moveY = offsetY * 0.03;

        consoleEl.style.transform = `
          translate(${moveX}px, ${moveY + floatY}px)
        `;

        requestAnimationFrame(animate);
      }

      document.addEventListener("mousemove", (e) => {
        window.mouseX = e.clientX;
        window.mouseY = e.clientY;
      });

      animate();
//redirect
      document.addEventListener("keydown", (event) => {
  if (event.key === ' ') {
    console.log('The space key was pressed!');
    window.location.href = "index.html"
  }
});
      
    </script>
  </body>
</html>
